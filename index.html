<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a237e" />
  <style>
    body {
      background-color: #e8eaf6;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .header {
      background-color: #1a237e;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .summary {
      display: flex;
      justify-content: space-around;
      margin: 12px;
      gap: 10px;
    }

    .summary-box {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      color: white;
      font-size: 13px;
    }

    .summary-box h6 {
      margin: 0 0 5px 0;
      font-size: 12px;
    }

    .summary-box p {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
    }

    .income-box { background-color: #2e7d32; }
    .expense-box { background-color: #c62828; }
    .balance-box { background-color: #1a237e; }

    .form-section {
      background-color: white;
      margin: 12px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .form-section h6 {
      font-weight: bold;
      color: #1a237e;
      margin-bottom: 12px;
    }

    .form-section select,
    .form-section input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      background-color: #1a237e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .records-section {
      background-color: white;
      margin: 12px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .records-section h6 {
      font-weight: bold;
      color: #1a237e;
      margin-bottom: 12px;
    }

    .record-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .record-item .info {
      flex: 1;
    }

    .record-item .info span {
      display: block;
      font-size: 11px;
      color: #999;
    }

    .record-item .amount {
      font-weight: bold;
      margin-right: 10px;
    }

    .income-amount { color: #2e7d32; }
    .expense-amount { color: #c62828; }

    .record-item .del-btn {
      background: none;
      border: none;
      color: red;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }

    .bottom-space { height: 30px; }

    .status {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin: 5px 12px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header d-flex justify-content-center align-items-center">
  <img src="icon-192.png" width="40" height="40" class="me-2" alt="Budget Tracker">
  <h2 class="mb-0">Budget Tracker</h2>
</div>

  <!-- SUMMARY BOXES -->
  <div class="summary">
    <div class="summary-box income-box">
      <h6>Income</h6>
      <p id="totalIncome">₱0</p>
    </div>
    <div class="summary-box expense-box">
      <h6>Expenses</h6>
      <p id="totalExpense">₱0</p>
    </div>
    <div class="summary-box balance-box">
      <h6>Balance</h6>
      <p id="totalBalance">₱0</p>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="form-section">
    <h6> Add Record</h6>

    <select id="type">
      <option value="">-- Type --</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input type="text" id="category" placeholder="Category (e.g. Food, Salary)" />
    <input type="number" id="amount" placeholder="Amount (₱)" />
    <input type="text" id="note" placeholder="Note (optional)" />

    <button class="add-btn" onclick="addRecord()">Save Record</button>
  </div>

  <div class="status" id="status"></div>

  <!-- RECORDS LIST -->
  <div class="records-section">
    <h6> Records</h6>
    <div id="recordList">Loading...</div>
  </div>

  <div class="bottom-space"></div>

  <script>
    // load records when page opens
    window.onload = function() {
      loadRecords();
    }

    // CREATE - add new record
    function addRecord() {
      var type = document.getElementById("type").value;
      var category = document.getElementById("category").value.trim();
      var amount = document.getElementById("amount").value;
      var note = document.getElementById("note").value.trim();

      if (type == "" || category == "" || amount == "") {
        document.getElementById("status").innerHTML = " Please fill type, category and amount!";
        return;
      }

      // get existing records from localStorage
      var records = JSON.parse(localStorage.getItem("budget") || "[]");

      // add new record with unique id
      records.push({
        id: Date.now(),
        type: type,
        category: category,
        amount: parseFloat(amount),
        note: note
      });

      // save back to localStorage
      localStorage.setItem("budget", JSON.stringify(records));

      document.getElementById("status").innerHTML = " Record saved!";
      document.getElementById("type").value = "";
      document.getElementById("category").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("note").value = "";

      loadRecords();
    }

    // READ - load all records from localStorage
    function loadRecords() {
      var data = JSON.parse(localStorage.getItem("budget") || "[]");
      renderRecords(data);
    }

    // show records on screen + compute summary
    function renderRecords(data) {
      var list = document.getElementById("recordList");
      list.innerHTML = "";

      var totalIncome = 0;
      var totalExpense = 0;

      if (data.length == 0) {
        list.innerHTML = "<p style='color:#999; font-size:13px;'>No records yet.</p>";
      }

      for (var i = data.length - 1; i >= 0; i--) {
        var item = data[i];

        if (item.type == "income") {
          totalIncome += parseFloat(item.amount);
        } else {
          totalExpense += parseFloat(item.amount);
        }

        list.innerHTML +=
          '<div class="record-item">' +
            '<div class="info">' +
              '<strong>' + item.category + '</strong>' +
              '<span>' + item.type + (item.note ? " • " + item.note : "") + '</span>' +
            '</div>' +
            '<span class="amount ' + (item.type == "income" ? "income-amount" : "expense-amount") + '">' +
              (item.type == "income" ? "+" : "-") + "₱" + parseFloat(item.amount).toLocaleString() +
            '</span>' +
            '<button class="del-btn" onclick="deleteRecord(' + item.id + ')">X</button>' +
          '</div>';
      }

      // update summary
      var balance = totalIncome - totalExpense;
      document.getElementById("totalIncome").innerHTML = "₱" + totalIncome.toLocaleString();
      document.getElementById("totalExpense").innerHTML = "₱" + totalExpense.toLocaleString();
      document.getElementById("totalBalance").innerHTML = "₱" + balance.toLocaleString();
    }

    // DELETE - remove record from localStorage
    function deleteRecord(id) {
      var records = JSON.parse(localStorage.getItem("budget") || "[]");

      var updated = [];
      for (var i = 0; i < records.length; i++) {
        if (records[i].id != id) {
          updated.push(records[i]);
        }
      }

      localStorage.setItem("budget", JSON.stringify(updated));
      document.getElementById("status").innerHTML = " Record deleted!";
      loadRecords();
    }

    // SERVICE WORKER
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/service-worker.js")
        .then(function() {
          console.log("it been register to service worker");
        })
        .catch(function(error) {
          console.log("Registration failed: ", error);
        });
    }
  </script>

</body>
</html>
